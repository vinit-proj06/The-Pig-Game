<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="style.css" />
    <title>Pig Game</title>
  </head>
  <body>
    <main>
      <section class="player player--0 player--active">
        <h2 class="name" id="name--0">Player 1</h2>
        <p class="score" id="score--0">43</p>
        <div class="current">
          <p class="current-label">Current</p>
          <p class="current-score" id="current--0">0</p>
        </div>
      </section>
      <section class="player player--1">
        <h2 class="name" id="name--1">Player 2</h2>
        <p class="score" id="score--1">24</p>
        <div class="current">
          <p class="current-label">Current</p>
          <p class="current-score" id="current--1">0</p>
        </div>
      </section>

      <img src="dice-5.png" alt="Playing dice" class="dice" />
      <button class="btn btn--new">🔄 New game</button>
      <button class="btn btn--roll">🎲 Roll dice</button>
      <button class="btn btn--hold">📥 Hold</button>
      
      <!-- Leaderboard UI -->
      <div class="leaderboard" style="position: absolute; top: 1rem; left: 50%; transform: translateX(-50%); background: rgba(255, 255, 255, 0.9); padding: 1rem 2.5rem; border-radius: 10px; z-index: 10; text-align: center; box-shadow: 0 1rem 2rem rgba(0,0,0,0.15); min-width: 250px;">
        <h3 style="margin-top: 0; font-family: 'Nunito', sans-serif; color: #333; text-transform: uppercase;">🏆 Top Highscores</h3>
        <ul class="leaderboard-list" style="list-style: none; padding: 0; margin: 0; font-size: 1.1rem; font-family: 'Nunito', sans-serif; color: #444; font-weight: bold;">
          <li>Loading DB...</li>
        </ul>
      </div>

    </main>
    <script src="script.js"></script>
  </body>
</html>
